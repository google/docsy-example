# Lychee link-checker config for the Docsy example site; run via
# `npm run check:links`.

cache = true
max_cache_age = "375d"
no_progress = true
extensions = ["html"]              # built HTML only
include_fragments = "full"         # check in-page anchors
index_files = ["index.html"]       # resolve Hugo pretty-URL dir links to index.html

exclude_path = [
  'blog/(\d+/)?page/\d+',  # blog pagination
]

exclude = [
  '[?&]link-check=no',                              # opt-out query param
  '/index\.xml$',                                   # rel=alternate RSS links
  '/_redirects$',                                   # rel=alternate Netlify redirects
  '^https?://[^/]+/(categories|tags)/',             # Docsy-generated taxonomy
  '^https?://localhost\b',
  '^https://upload\.wikimedia\.org/',               # bot-wall (400) on automated thumb requests

  # Docsy page-meta links
  '^https?://github\.com/.*?/.*?/(new|edit)/',                     # view/edit-source links
  '^https://github\.com/[^/]+/[^/]+/issues/new',                   # per-page "create issue" feedback links
  '^https://github\.com/google/docsy-example/commit/',             # per-page provenance links
  '^https://github\.com/google/docsy-example/tree/main/content/',  # view-source tree links

  '^https://github\.com/google/docsy/releases/v[\d.]+-dev',  # non-existent -dev releases
  '^https://github\.com/USERNAME/REPOSITORY',                # user guide placeholder repo
]
